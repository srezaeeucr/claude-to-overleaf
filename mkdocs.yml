site_name: claude-to-overleaf
site_description: Sync a local Git repo to an Overleaf project — designed for prompt-driven invocation by Claude Code.
site_url: https://srezaeeucr.github.io/claude-to-overleaf/
repo_url: https://github.com/srezaeeucr/claude-to-overleaf
repo_name: srezaeeucr/claude-to-overleaf
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Using with Claude Code: using-with-claude-code.md
  - Reference: reference.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/srezaeeucr/claude-to-overleaf
